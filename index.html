<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniMap — Login</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="login-page">
    <div class="login-container fade-in">
      <div class="login-brand">zhask.co</div>

      <!-- Graduation Cap & Diploma Icon -->
      <div class="login-icon">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <!-- Diploma -->
          <g transform="translate(30, 100) rotate(-20)">
            <rect x="0" y="0" width="120" height="40" rx="20" ry="20" fill="#f0e6d3" stroke="#d4c5a9" stroke-width="2"/>
            <rect x="10" y="5" width="100" height="30" rx="15" ry="15" fill="#faf3e6"/>
            <!-- Ribbon -->
            <circle cx="20" cy="20" r="14" fill="#e74c3c"/>
            <circle cx="20" cy="20" r="9" fill="#c0392b"/>
            <path d="M14 34 L10 52 L20 46 L30 52 L26 34" fill="#e74c3c"/>
            <circle cx="20" cy="20" r="5" fill="#f39c12"/>
          </g>
          <!-- Graduation Cap -->
          <g transform="translate(50, 20)">
            <!-- Cap top (diamond shape) -->
            <polygon points="50,10 110,40 50,60 -10,40" fill="#2c3e50"/>
            <polygon points="50,10 110,40 50,50 -10,30" fill="#34495e"/>
            <!-- Cap board -->
            <rect x="30" y="55" width="40" height="8" rx="2" fill="#2c3e50"/>
            <!-- Tassel string -->
            <line x1="110" y1="40" x2="120" y2="75" stroke="#f39c12" stroke-width="2.5"/>
            <!-- Tassel -->
            <circle cx="120" cy="78" r="4" fill="#f39c12"/>
            <rect x="117" y="82" width="6" height="15" rx="3" fill="#f39c12"/>
          </g>
        </svg>
      </div>

      <h1 class="login-title" data-i18n="login_hello">Hello Student!</h1>

      <!-- Error Message -->
      <div class="auth-message" id="authMessage" style="display:none;"></div>

      <form class="login-form" id="loginForm">
        <input type="email" class="login-input" id="loginEmail" placeholder="Email" required>
        <input type="password" class="login-input" id="loginPassword" placeholder="Пароль" required>
        <button type="submit" class="login-btn" id="loginBtn">
          <span class="btn-text" data-i18n="login_button">Sign In</span>
          <span class="btn-loader" style="display:none;"><i class="fas fa-spinner fa-spin"></i></span>
        </button>
      </form>

      <div class="auth-links">
        <span data-i18n="login_no_account">Don't have an account?</span>
        <a href="register.html" class="auth-link" data-i18n="login_register_link">Register</a>
      </div>
    </div>
  </div>

  <script src="js/i18n.js"></script>
  <script>
    // If already logged in, redirect
    (async function() {
      const token = localStorage.getItem('unimap_token');
      if (token) {
        try {
          const res = await fetch('/api/check-auth', {
            headers: { 'Authorization': 'Bearer ' + token }
          });
          if (res.ok) { window.location.href = 'dashboard.html'; return; }
        } catch(e) {}
      }
    })();

    const form = document.getElementById('loginForm');
    const msgEl = document.getElementById('authMessage');
    const btn = document.getElementById('loginBtn');

    function showMsg(text, isError) {
      msgEl.textContent = text;
      msgEl.className = 'auth-message ' + (isError ? 'error' : 'success');
      msgEl.style.display = 'block';
    }

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      msgEl.style.display = 'none';

      btn.disabled = true;
      btn.querySelector('.btn-text').style.display = 'none';
      btn.querySelector('.btn-loader').style.display = 'inline';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok && data.success) {
          localStorage.setItem('unimap_token', data.token);
          localStorage.setItem('unimap_user', JSON.stringify(data.user));
          window.location.href = 'dashboard.html';
        } else {
          showMsg(data.error || 'Ошибка входа', true);
        }
      } catch (err) {
        showMsg('Ошибка сервера. Попробуйте позже.', true);
      } finally {
        btn.disabled = false;
        btn.querySelector('.btn-text').style.display = '';
        btn.querySelector('.btn-loader').style.display = 'none';
      }
    });
  </script>
</body>
</html>
